name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel a stale run when a PR gets a new push, so a superseded npm
# install/lint/build doesn't keep holding a runner after it's been
# overtaken by a newer commit. Scoped per-workflow-per-ref so unrelated
# PRs (and the push-to-main trigger) never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest
    # A static Next.js lint + export normally finishes well under 5 minutes.
    # Without this the job inherits the 360-minute default, turning a hung npm
    # install or build into a 6-hour runner hold.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): the committed lockfile omits Linux-only
        # optional deps (@emnapi/*, nested in wasm32 variants) that macOS dev
        # machines never resolve, so strict `npm ci` fails on the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build static export
        timeout-minutes: 5
        run: npm run build

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    # Doc-only changes get a fast, isolated verdict instead of waiting on the
    # full lint-and-build job.
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (markdownlint)
        run: npm run lint:md
