name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest
    # A static Next.js lint + export normally finishes well under 5 minutes.
    # Without this the job inherits the 360-minute default, turning a hung npm
    # install or build into a 6-hour runner hold.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): the committed lockfile omits Linux-only
        # optional deps (@emnapi/*, nested in wasm32 variants) that macOS dev
        # machines never resolve, so strict `npm ci` fails on the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint (Stylelint)
        run: npm run lint:css

      - name: Build static export
        timeout-minutes: 5
        run: npm run build
