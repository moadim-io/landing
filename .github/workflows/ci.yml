name: CI

# Lint and build the static site on every PR and on pushes to main, so style
# regressions and broken builds are caught before they reach production. The
# repo ships an ESLint config (with a custom no-console rule) and a Next.js
# static export, but nothing was enforcing either in CI until now.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` type-checks and produces the static export in `out/`.
      - name: Build
        run: npm run build
