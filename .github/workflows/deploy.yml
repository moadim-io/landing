name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  # Never cancel an in-flight run: this job deploys to Cloudflare Pages, and
  # killing it mid-`wrangler pages deploy` can leave a half-uploaded/cancelled
  # deployment. Queued runs serialize instead, and the last one still ends on
  # the latest commit.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A static Next.js export + Cloudflare Pages deploy normally finishes in a
    # couple of minutes. Without this, the job inherits the 360-minute (6-hour)
    # default, so a hung build, npm install, or wrangler call would hold a runner
    # for hours. 10 minutes leaves comfortable headroom over a cold build+deploy
    # while turning a hang into a fast, visible failure.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): the committed lockfile omits Linux-only
        # optional deps (@emnapi/*, nested in wasm32 variants) that macOS dev
        # machines never resolve, so strict `npm ci` fails on the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Build static export
        timeout-minutes: 5
        run: npm run build

      - name: Deploy to Cloudflare Pages
        timeout-minutes: 5
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=moadim-landing --branch=main --commit-dirty=true
