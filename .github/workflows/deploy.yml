name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A static Next.js export + Cloudflare Pages deploy normally finishes in a
    # couple of minutes. Without this, the job inherits the 360-minute (6-hour)
    # default, so a hung build, npm install, or wrangler call would hold a runner
    # for hours. 10 minutes leaves comfortable headroom over a cold build+deploy
    # while turning a hang into a fast, visible failure.
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm ci installs the exact, frozen tree from package-lock.json
        # instead of re-resolving it, so the production build is reproducible.
        run: npm ci --no-audit --no-fund

      - name: Build static export
        timeout-minutes: 5
        run: npm run build

      - name: Deploy to Cloudflare Pages
        timeout-minutes: 5
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=moadim-landing --branch=main --commit-dirty=true
