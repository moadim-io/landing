name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    # Only run the deploy job for changes that can actually affect the
    # exported static site. Docs/meta files (README, CHANGELOG, LICENSE,
    # other workflows, etc.) are intentionally excluded so a docs-only push
    # doesn't trigger a cold build + a new production Cloudflare deploy.
    # This file is included so edits to the deploy workflow itself are
    # always exercised.
    paths:
      - "app/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: pages-deploy
  # Never cancel an in-flight run: this job deploys to Cloudflare Pages, and
  # killing it mid-`wrangler pages deploy` can leave a half-uploaded/cancelled
  # deployment. Queued runs serialize instead, and the last one still ends on
  # the latest commit.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A static Next.js export + Cloudflare Pages deploy normally finishes in a
    # couple of minutes. Without this, the job inherits the 360-minute (6-hour)
    # default, so a hung build, npm install, or wrangler call would hold a runner
    # for hours. 10 minutes leaves comfortable headroom over a cold build+deploy
    # while turning a hang into a fast, visible failure.
    timeout-minutes: 10
    # Declares a GitHub Environment so every production deploy shows up in the
    # repo's Deployments tab with a direct link to the live URL, and so
    # Cloudflare credentials can be scoped to this environment instead of
    # living only as repo-wide secrets.
    environment:
      name: production
      url: https://moadim.io
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm ci installs the exact, frozen tree from package-lock.json
        # instead of re-resolving it, so the production build is reproducible.
        run: npm ci --no-audit --no-fund

      - name: Cache Next.js build cache
        # Persists .next/cache (compiled modules, minified output, image/font
        # pipeline artifacts) across runs so `next build` can do an incremental
        # build instead of a fully cold one. Only the build cache is stored
        # here, not `out/` or `.next/` wholesale, so the published artifact is
        # unaffected by cache presence/absence; a stale or missing cache just
        # falls back to a full build. See:
        # https://nextjs.org/docs/app/building-your-application/deploying/ci-build-caching
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('app/**', '*.ts', '*.tsx', '*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build static export
        timeout-minutes: 5
        run: npm run build

      - name: Verify static export
        # A green `next build` can still emit an incomplete out/ (a dropped route, a no-op
        # metadata route, a public/ file that didn't get copied). Fail here, before wrangler
        # uploads anything, instead of shipping a silently broken page to prod.
        run: npm run verify:export

      - name: Deploy to Cloudflare Pages
        timeout-minutes: 5
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=moadim-landing --branch=main --commit-dirty=true

      - name: Smoke test the live site
        # `wrangler pages deploy` exiting 0 only confirms the upload
        # succeeded — it doesn't confirm moadim.io actually serves the new
        # build. Without this, a broken-but-uploaded deploy (edge propagation
        # failure, DNS/routing misconfiguration, a 5xx from the origin) ships
        # to production undetected. `--retry` absorbs the few seconds of edge
        # propagation lag right after a deploy; a real failure still fails
        # the job loudly instead of shipping silently.
        timeout-minutes: 2
        run: |
          set -euo pipefail
          body="$(curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://moadim.io)"
          if ! grep -q "Moadim" <<< "$body"; then
            echo "::error::https://moadim.io responded but the body doesn't mention Moadim — the live site may be serving a broken or unexpected page." >&2
            exit 1
          fi
