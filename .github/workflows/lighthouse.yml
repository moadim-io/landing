name: Lighthouse

# Gate every PR on Lighthouse budgets for the landing page (issue #75):
# performance, accessibility, best-practices, and SEO scores must clear the
# thresholds in .lighthouserc.json. Without this, a regression (an
# unoptimized image, a dropped alt text, a missing meta tag) only surfaces
# if someone happens to run Lighthouse by hand.
#
# Runs against the built static export (staticDistDir), matching how the
# site is actually served in production, and scopes to the root page only —
# not-found/error routes intentionally omit SEO metadata (they shouldn't be
# indexed), so including them would fail the seo assertion on unrelated PRs.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
