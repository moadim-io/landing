name: (temp) Generate visual regression baseline

# One-off helper to render the initial Playwright screenshot baseline on the
# same ubuntu-latest/chromium combination visual-regression.yml runs on, so
# the committed PNGs don't mismatch CI's font rendering. Deleted once the
# baseline this run produces is committed — see #192.
on:
  push:
    branches: [fix/issue-192-visual-regression]

jobs:
  gen-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright's Chromium
        run: npx playwright install --with-deps chromium

      - name: Build static export
        run: npm run build

      - name: Generate baseline screenshots
        run: npx playwright test --update-snapshots

      - name: Upload baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baseline
          path: e2e/visual.spec.ts-snapshots/
          retention-days: 1
