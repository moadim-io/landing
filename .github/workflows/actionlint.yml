name: actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

# Cancel a stale lint run when a PR gets a new push, mirroring ci.yml — a
# superseded run on an old commit has no reason to keep holding a runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflow YAML
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        # shellcheck is enabled by default and lints embedded `run:` steps.
        # Pinned to the image digest, not the floating `1.7.12` tag — every
        # other third-party action across these workflows is already pinned
        # this way (SHA for actions/*, digest for this Docker action) to
        # close the same supply-chain tampering vector a mutable tag leaves
        # open; this one was missed when the gate was added in #313.
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12
        with:
          args: -color
