name: Visual regression

on:
  pull_request:
  push:
    branches: [main]
  # Lets a maintainer re-run the screenshot diff against main on demand (e.g.
  # to confirm a flaky run was a fluke, or after touching a baseline PNG)
  # without pushing an empty commit. Mirrors the pattern already used by
  # deploy.yml and link-check.yml.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Playwright screenshot diff
    runs-on: ubuntu-latest
    # A single-page screenshot diff normally finishes in under a minute; this
    # bounds a hung browser/server instead of holding a runner for hours.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright's Chromium
        # Only the chromium browser is needed — playwright.config.ts pins the
        # visual-regression projects to a single engine so baselines never
        # have to account for cross-browser rendering variance.
        run: npx playwright install --with-deps chromium

      - name: Build static export
        run: npm run build

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
