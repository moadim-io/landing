name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly, so a dropped control (branch protection, pinned deps, dangerous
    # workflow patterns, etc.) surfaces even on weeks with no push to main.
    - cron: "30 1 * * 6"

# Least-privilege by default; the job below grants only what Scorecard needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required so results can be uploaded to the Security > Code scanning tab.
      security-events: write
      # Required for the GitHub OIDC token used when publish_results: true.
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to api.scorecard.dev, which both powers the
          # README badge and contributes to the OpenSSF's public dataset
          # instead of relying on their own periodic scan of this repo.
          publish_results: true

      # Optional: keep the raw SARIF available from the Actions tab for a
      # few days, mirroring the upstream ossf/scorecard example workflow.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
