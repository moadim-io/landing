name: Scorecard

# Complements the individual controls this repo already runs (CodeQL, the dependency-review
# gate, Actions pinned to commit SHAs) with a single continuous grade of the whole security
# posture — token permissions, branch protection, pinned dependencies, dangerous workflow
# patterns, presence of a security policy, etc. — and flags regressions none of those
# individual checks target. See #223.
on:
  branch_protection_rule:
  schedule:
    # Weekly, mirroring codeql.yml's cadence.
    - cron: "23 4 * * 1"
  push:
    branches: [main]
  # Lets a maintainer re-run the Scorecard analysis on demand (e.g. right
  # after enabling a new check, or to confirm a flaky run was a fluke)
  # instead of waiting for the weekly schedule or a push to main. Mirrors
  # the pattern already applied to ci.yml, codeql.yml, lighthouse.yml,
  # visual-regression.yml, and actionlint.yml — this workflow, unlike
  # dependency-review.yml, needs no pull_request base/head diff, so it has
  # no reason to be the odd one out.
  workflow_dispatch:

# Least-privilege default; the job below elevates only what publishing/SARIF upload needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Every other job in this repo's workflows sets an explicit timeout instead of
    # inheriting the 360-minute (6-hour) GitHub Actions default (see deploy.yml's
    # rationale) — this was the one job across all workflows still missing one, so a
    # hung scorecard-action run or SARIF upload would otherwise hold a runner for
    # hours instead of failing fast and visibly. 15 minutes mirrors codeql.yml, the
    # other SARIF-uploading static-analysis job in this repo.
    timeout-minutes: 15
    permissions:
      security-events: write # Upload SARIF to the Security tab.
      id-token: write # Publish results, signed via Sigstore.
      contents: read
      actions: read # Required by scorecard's Token-Permissions/Dangerous-Workflow checks.

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
